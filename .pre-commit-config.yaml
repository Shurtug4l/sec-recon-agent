# Pre-commit hooks run locally before each `git commit`. They mirror the
# fast checks the backend CI runs, so a failing commit fails fast on the
# developer's machine instead of burning a CI cycle.
#
# Bootstrap:
#   uv sync --extra dev          # installs pre-commit
#   uv run pre-commit install    # writes .git/hooks/pre-commit
#
# Run on the whole tree:
#   uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep aligned with the ruff version in the dev extra; the pinned
    # rev here ships its own ruff binary, which must understand every
    # rule selector in pyproject.toml (e.g. ASYNC240 from 0.8.x).
    # Bumped by the pre-commit ecosystem in .github/dependabot.yml.
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: ["--fix"]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.snap$
      - id: end-of-file-fixer
        exclude: \.snap$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        # 512 KB guards source/tests against accidental binary commits.
        # docs/assets/ is exempt: README demo media (GIF / screenshots) is
        # intentionally large, hand-curated, and reviewed in the PR diff.
        args: ["--maxkb=512"]
        exclude: ^docs/assets/

  # mypy --strict against src/ only. Tests are excluded to keep the
  # local loop fast (the matching test types are picked up by ruff +
  # pytest itself; mypy on tests adds little signal for a lot of time).
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (src)
        entry: uv run --frozen mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: ["src"]
