# Egress allowlist proxy for the sec-recon-agent stack.
#
# Default-deny forward proxy: the app containers route outbound HTTP(S) through
# here (HTTPS_PROXY), and only the feed hosts the tools legitimately need are
# permitted. This is a network-level belt over the application-level
# *_TRUSTED_HOST locks: even if a tool were tricked into requesting a different
# host (SSRF via a redirect, a compromised dependency), the connection is
# refused at the proxy.

# No User/Group directives: the container already runs as `nobody` (see the
# Dockerfile), and tinyproxy calling setuid while non-root would fail under
# no-new-privileges. Privilege drop happens at the container boundary instead.
Port 8888
Listen 0.0.0.0
Timeout 600

# Log to stdout so `docker compose logs egress-proxy` shows allow/deny decisions.
LogFile "/dev/stdout"
LogLevel Info
PidFile "/tmp/tinyproxy.pid"

MaxClients 50

# Who may USE the proxy: only the internal compose network can reach this
# container (no published port), so allow any client that connects.
Allow 0.0.0.0/0

# Restrict CONNECT (HTTPS tunnels) to 443. Every feed is HTTPS.
ConnectPort 443

# Host allowlist. FilterDefaultDeny flips the semantics to "deny unless matched"
# so a new/unknown destination is refused, not permitted. The filter is applied
# to the CONNECT target host as well as plain HTTP requests.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off
