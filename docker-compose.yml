# Two-process layout: the MCP server and the agent API are independent
# containers that talk to each other over an internal compose network.
# A shared named volume keeps the ChromaDB index and the Exploit-DB cache.
#
# Usage:
#   cp .env.example .env           # set ANTHROPIC_API_KEY at minimum
#   docker compose --profile seed run --rm seed-job   # one-shot: populate index
#   docker compose up -d           # start MCP server + agent API
#   docker compose logs -f         # tail logs
#   docker compose down            # stop, keep the volume

services:

  mcp-server:
    build:
      context: .
      target: runtime
    image: sec-recon-agent:0.1.0
    container_name: sec-recon-mcp
    command: sec-recon-mcp
    environment:
      MCP_SERVER_HOST: "0.0.0.0"
      MCP_SERVER_PORT: "8001"
      CHROMA_PERSIST_DIR: "/app/data/cve_index"
      NVD_API_KEY: "${NVD_API_KEY:-}"
      # Local sliding-window cap on NVD requests. Must reach the process that
      # actually calls NVD (the MCP tools live here), otherwise the config
      # default holds regardless of what the operator set. Raise to 50 with an
      # NVD_API_KEY; 5 is the keyless budget. nvd_client retries 429 anyway
      # (tenacity, >30s backoff), but the right cap avoids the retry cost.
      NVD_RATE_LIMIT_PER_30S: "${NVD_RATE_LIMIT_PER_30S:-5}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # OTEL_EXPORTER_OTLP_ENDPOINT empty -> spans go to stdout. Set to
      # `http://jaeger:4318` to ship to the Jaeger sidecar (started with
      # `make obs-up` or `docker compose --profile observability up`).
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      # ANTHROPIC_API_KEY is not needed by the MCP process; only the agent uses it.
    volumes:
      - sec-recon-data:/app/data
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      # /sse hangs on a successful connect (it is a streaming endpoint), so
      # use a lightweight TCP-level probe instead.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8001)); sys.exit(0)"
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  agent-api:
    build:
      context: .
      target: runtime
    image: sec-recon-agent:0.1.0
    container_name: sec-recon-api
    command: sec-recon-api
    environment:
      AGENT_API_HOST: "0.0.0.0"
      AGENT_API_PORT: "8000"
      # Compose internal DNS resolves "mcp-server" to the MCP container.
      MCP_SERVER_HOST: "mcp-server"
      MCP_SERVER_PORT: "8001"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in .env or the host environment}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL: "${LLM_MODEL:-claude-haiku-4-5-20251001}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      # Auth + rate limit. Empty values disable the controls.
      API_KEYS: "${API_KEYS:-}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-}"
      AUDIT_LOG_ENABLED: "${AUDIT_LOG_ENABLED:-true}"
      AUDIT_INCLUDE_QUERY: "${AUDIT_INCLUDE_QUERY:-false}"
      AUDIT_INCLUDE_SUMMARY: "${AUDIT_INCLUDE_SUMMARY:-false}"
      # This container runs read-only, so the config default (./data/audit.db)
      # lands on the read-only image layer and sqlite fails with "unable to
      # open database file". Point the append-only hash-chain audit at the
      # dedicated writable volume below so the trail actually persists.
      AUDIT_DB_PATH: "/app/audit/audit.db"
    ports:
      # Only bind to localhost; the demo is single-tenant and has no auth.
      # Edit to 0.0.0.0 only if you intentionally want network exposure.
      - "127.0.0.1:8000:8000"
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Writable mount for the audit SQLite; the rest of the rootfs is read-only.
      # Dedicated volume (not the CVE-index one) keeps the tamper-evident trail
      # isolated from the data store.
      - sec-recon-audit:/app/audit
    security_opt:
      - no-new-privileges:true

  # One-shot: pulls recent CRITICAL+HIGH CVEs from NVD and indexes them into
  # ChromaDB on the shared volume. Run before `docker compose up`.
  # Excluded from the default `docker compose up` via the "seed" profile.
  seed-job:
    build:
      context: .
      target: runtime
    image: sec-recon-agent:0.1.0
    command: sec-recon-seed
    environment:
      CHROMA_PERSIST_DIR: "/app/data/cve_index"
      NVD_API_KEY: "${NVD_API_KEY:-}"
      # Seeding is NVD-bound (pulls recent CRITICAL+HIGH CVEs); the cap matters
      # here most. Same forwarding as mcp-server so both honor the operator's
      # setting instead of the config default.
      NVD_RATE_LIMIT_PER_30S: "${NVD_RATE_LIMIT_PER_30S:-5}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - sec-recon-data:/app/data
    profiles: ["seed"]
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
    image: sec-recon-frontend:0.1.0
    container_name: sec-recon-frontend
    environment:
      AGENT_API_URL: "http://agent-api:8000"
      # Server-side only — used by the Next.js proxy when calling
      # /v1/triage and /v1/meta. Never exposed to the browser bundle.
      AGENT_API_KEY: "${AGENT_API_KEY:-}"
      NODE_ENV: "production"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      agent-api:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # OpenTelemetry collector + UI for spans emitted by mcp-server and agent-api.
  # Enabled with `--profile observability`. The OTLP HTTP endpoint at :4318
  # is what the app processes target; the UI lives on :16686.
  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: sec-recon-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4318:4318"    # OTLP/HTTP receiver (also reachable as jaeger:4318 inside compose)
    profiles: ["observability"]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  sec-recon-data:
    name: sec-recon-data
  sec-recon-audit:
    name: sec-recon-audit
