# Dependabot keeps every dependency ecosystem we ship aligned with
# upstream security fixes. Weekly cadence is a deliberate trade-off:
# daily creates churn, monthly leaves CVE windows open too long.

version: 2

updates:
  # Python deps: uv-managed but Dependabot reads pyproject + uv.lock.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps-py)"

  # Frontend deps.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    # eslint-config-next and typescript are tightly coupled to Next.js's
    # major: bumping them independently lands in CI red until Next itself
    # moves. Skip the major bump for both; minor/patch still come through.
    # Same logic for next itself — its major bump is a deliberate
    # decision that needs the surrounding ecosystem moved together.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps-js)"

  # Container base images (python:3.13-slim, node:22-alpine).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps-docker)"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    # Node.js uses even majors as LTS and odd majors as current. Skip
    # the auto-major bump so Dependabot does not propose node 23/25/27
    # (non-LTS) — we move to the next LTS manually when it has been GA
    # for at least six months. Minor + patch always flow.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps-docker)"

  # CI actions: the actions/* family has had supply-chain incidents
  # in the past; pinning + auto-updating is the right discipline.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps-ci)"

  # Pre-commit hooks: the ruff-pre-commit pin must track the ruff
  # version we declare in pyproject so the hook understands every
  # rule selector we use. A stale pin produces a TOML parse error
  # that pre-commit reports as "Failed" between two "Passed" lines
  # and is easy to miss — that bit us once already.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps-precommit)"
