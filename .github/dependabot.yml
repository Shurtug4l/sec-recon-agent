# Dependabot keeps every dependency ecosystem we ship aligned with
# upstream security fixes. Weekly cadence is a deliberate trade-off:
# daily creates churn, monthly leaves CVE windows open too long.

version: 2

updates:
  # Python deps: uv-managed but Dependabot reads pyproject + uv.lock.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps-py)"

  # Frontend deps.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps-js)"

  # Container base images (python:3.13-slim, node:22-alpine).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps-docker)"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps-docker)"

  # CI actions: the actions/* family has had supply-chain incidents
  # in the past; pinning + auto-updating is the right discipline.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps-ci)"
