name: backend

on:
  # Path filters on push avoid burning CI minutes on docs-only commits
  # landing through merges. On pull_request we run unconditionally because
  # the branch-protection rule makes this workflow a required check, and a
  # required check that never runs would block any docs-only PR (the
  # check sits in 'expected, pending' forever).
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid burning credits on stacked pushes to the same PR.
concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Aggregator that the branch-protection "Require status checks to
  # pass" rule points at. It depends on every matrix entry of the
  # `matrix-test` job and fails fast when any entry fails. Keeping the
  # original "lint + type-check + tests" name avoids re-pointing the
  # protection rule every time the matrix grows.
  lint-and-test:
    name: lint + type-check + tests
    runs-on: ubuntu-latest
    needs: matrix-test
    if: always()
    steps:
      - name: Fail if any matrix entry failed
        run: |
          if [ "${{ needs.matrix-test.result }}" != "success" ]; then
            echo "matrix-test result was '${{ needs.matrix-test.result }}' — failing aggregator."
            exit 1
          fi
          echo "matrix-test passed across every Python version."

  matrix-test:
    name: lint + type-check + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      # Confirms the declared `requires-python = ">=3.12"` actually holds.
      # 3.14 is excluded for now because the uv-pinned interpreters lag
      # the wider 3.14 wheel ecosystem on a few of our transitive deps.
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (frozen)
        run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} ruff check src tests

      - name: Type check (mypy --strict)
        run: uv run --python ${{ matrix.python-version }} mypy src

      # Skip @pytest.mark.slow (ChromaDB roundtrip + ONNX model load),
      # which is too long to run on every PR. The full suite runs locally
      # and end-to-end smoke happens via `make up` against a live stack.
      - name: Tests (fast subset + coverage)
        run: uv run --python ${{ matrix.python-version }} pytest -m "not slow" --cov --cov-report=term -q
