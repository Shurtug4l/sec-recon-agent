name: backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-backend.yml"
  workflow_dispatch:

# Avoid burning credits on stacked pushes to the same PR.
concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + type-check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies (frozen)
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy --strict)
        run: uv run mypy src

      # Skip @pytest.mark.slow (ChromaDB roundtrip + ONNX model load),
      # which is too long to run on every PR. The full suite runs locally
      # and end-to-end smoke happens via `make up` against a live stack.
      - name: Tests (fast subset)
        run: uv run pytest -m "not slow" -q
