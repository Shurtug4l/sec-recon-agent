name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check-and-build:
    name: type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        # --legacy-peer-deps mirrors the Dockerfile; Next.js 15's peer range
        # is pinned to a React 19 RC tag that GA satisfies in practice.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      # Lint deliberately skipped:
      # - `next lint` is interactive on first run (prompts Strict / Base /
      #   Cancel for ESLint setup) and exits 1 in CI without stdin.
      # - Next 15+ has deprecated `next lint` in favor of running ESLint
      #   directly; that migration is out of scope for this PR.
      # - TypeScript strict + a successful Next.js build cover the most
      #   important correctness signals; style/unused-var enforcement
      #   can be re-added later via a flat ESLint config.
      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
