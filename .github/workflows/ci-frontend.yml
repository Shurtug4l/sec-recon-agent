name: frontend

on:
  # See ci-backend.yml for the rationale: path filters on push only;
  # pull_request runs unconditionally so the required-check gate is
  # always satisfied by a real run.
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check-and-build:
    name: type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm ci` requires the lockfile to be in sync with package.json
        # and never mutates either; that is the deterministic install path
        # we want in CI. --legacy-peer-deps mirrors the Dockerfile: Next 15
        # peers a React 19 RC tag that GA satisfies in practice.
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Lint (ESLint flat config)
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
