name: frontend

on:
  # See ci-backend.yml for the rationale: path filters on push only;
  # pull_request runs unconditionally so the required-check gate is
  # always satisfied by a real run.
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check-and-build:
    name: type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm ci` requires the lockfile to be in sync with package.json
        # and never mutates either; that is the deterministic install path
        # we want in CI. --legacy-peer-deps mirrors the Dockerfile: Next 15
        # peers a React 19 RC tag that GA satisfies in practice.
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Docs corpus is fresh
        # The /docs route renders from src/lib/docs-generated.json, generated
        # from docs/*.md at build time and committed (the Docker build context
        # is frontend/ only, so it cannot regenerate). Regenerate here — where
        # the full repo is checked out — and fail if the committed copy drifted.
        run: |
          npm run generate:docs
          git diff --exit-code src/lib/docs-generated.json \
            || { echo "::error::docs-generated.json is stale — run 'npm run generate:docs' in frontend/ and commit"; exit 1; }

      - name: Lint (ESLint flat config)
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
