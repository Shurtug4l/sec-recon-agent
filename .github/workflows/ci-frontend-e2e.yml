name: frontend-e2e

# P12 completeness gate. Builds the keyless static demo under the Pages base path,
# then runs the two browser-free link gates (dead cross-link detection rides the
# gen-docs step inside build:demo; unresolved-href detection is check:links) plus
# the axe + horizontal-overflow sweep against the real export. This is a blocking
# PR check: a dead cross-link, an unresolved href, or an a11y/overflow regression
# fails here instead of reaching the live Pages site. The P6-class failures (a nav
# link surviving a route rename, a header overflowing a mid-width band) shipped
# precisely because these checks were a manual pre-push ritual, not a gate.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-and-verify:
    name: export + completeness gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    env:
      # Scope routes + assets under the project Pages sub-path, so the export and
      # the sweep's static server mirror https://<user>.github.io/<repo>/ exactly.
      NEXT_PUBLIC_BASE_PATH: /sec-recon-agent

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Install Playwright (ephemeral, not a package.json dep)
        # The browser binary is heavy and the other frontend jobs must stay lean,
        # so the sweep's deps live only here (--no-save), never in the lockfile.
        # Major-pinned: Playwright has no 2.x, @axe-core/playwright tracks axe 4.x.
        run: |
          npm i --no-save --no-audit --no-fund --legacy-peer-deps playwright@1 "@axe-core/playwright@4"
          npx playwright install --with-deps chromium

      - name: Build static demo export
        # Runs gen-docs first, which enforces the dead-cross-link gate (a renamed
        # heading or a typo'd anchor throws here before the export is written).
        run: npm run build:demo

      - name: Check exported links
        run: npm run check:links

      - name: Accessibility + overflow sweep
        run: npm run a11y:sweep
